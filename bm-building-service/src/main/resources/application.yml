server:
  port: ${BUILDING_SERVICE_PORT:8083}

spring:
  application:
    name: bm-building-service

  datasource:
    url: ${BUILDING_DB_URL}
    username: ${BUILDING_DB_USERNAME}
    password: ${BUILDING_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info

  endpoint:
    health:
      show-details: never

info:
  app:
    name: bm-Building-service
    version: 1.0.0
    description: Building service for Building Management