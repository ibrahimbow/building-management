services:

  nginx:
    image: nginx:1.27-alpine
    container_name: joritna-nginx
    restart: unless-stopped

    ports:
      - "80:80"

    volumes:
      - ./nginx/api.conf:/etc/nginx/conf.d/default.conf:ro

    depends_on:
      - bm-gateway-service

    networks:
      - joritna-network

  postgres:
    image: postgres:16-alpine
    container_name: joritna-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    volumes:
      - joritna_postgres_data:/var/lib/postgresql/data
      - ./postgres/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro

    networks:
      - joritna-network

  bm-kafka:
    image: apache/kafka:3.9.0
    container_name: joritna-kafka
    restart: unless-stopped

    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@bm-kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://bm-kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

    volumes:
      - joritna_kafka_data:/var/lib/kafka/data

    networks:
      - joritna-network

  bm-auth-service:
    build:
      context: ../../
      dockerfile: bm-auth-service/Dockerfile.prod

    container_name: joritna-auth-service
    restart: unless-stopped

    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      AUTH_DB_URL: ${AUTH_DB_URL}
      AUTH_DB_USERNAME: ${AUTH_DB_USERNAME}
      AUTH_DB_PASSWORD: ${AUTH_DB_PASSWORD}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET}
      AUTH_JWT_EXPIRATION_MINUTES: ${AUTH_JWT_EXPIRATION_MINUTES}

    expose:
      - "8081"

    depends_on:
      - postgres

    networks:
      - joritna-network

  bm-gateway-service:
    build:
      context: ../../
      dockerfile: bm-gateway-service/Dockerfile.prod

    container_name: joritna-gateway
    restart: unless-stopped

    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL}
      BUILDING_SERVICE_URL: ${BUILDING_SERVICE_URL}
      ANNOUNCEMENT_SERVICE_URL: ${ANNOUNCEMENT_SERVICE_URL}
      SHARE_AND_HELP_SERVICE_URL: ${SHARE_AND_HELP_SERVICE_URL}
      CHAT_SERVICE_URL: ${CHAT_SERVICE_URL}
      NOTIFICATION_SERVICE_URL: ${NOTIFICATION_SERVICE_URL}
      FILE_SERVICE_URL: ${FILE_SERVICE_URL}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET}

    expose:
      - "8080"

    depends_on:
      - bm-auth-service
      - bm-building-service
      - bm-announcement-service
      - bm-share-and-help-service
      - bm-chat-service
      - bm-notification-service
      - bm-file-service
      - bm-kafka

    networks:
      - joritna-network

  bm-building-service:
    build:
      context: ../../
      dockerfile: bm-building-service/Dockerfile.prod

    container_name: joritna-building-service
    restart: unless-stopped

    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}

      BUILDING_DB_URL: ${BUILDING_DB_URL}
      BUILDING_DB_USERNAME: ${BUILDING_DB_USERNAME}
      BUILDING_DB_PASSWORD: ${BUILDING_DB_PASSWORD}

      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL}

    expose:
      - "8083"

    depends_on:
      - postgres
      - bm-auth-service

    networks:
      - joritna-network

  bm-announcement-service:
    build:
      context: ../../
      dockerfile: bm-announcement-service/Dockerfile.prod

    container_name: joritna-announcement-service
    restart: unless-stopped

    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}

      ANNOUNCEMENT_DB_URL: ${ANNOUNCEMENT_DB_URL}
      ANNOUNCEMENT_DB_USERNAME: ${ANNOUNCEMENT_DB_USERNAME}
      ANNOUNCEMENT_DB_PASSWORD: ${ANNOUNCEMENT_DB_PASSWORD}

      BUILDING_SERVICE_URL: ${BUILDING_SERVICE_URL}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}

    expose:
      - "8084"

    depends_on:
      - postgres
      - bm-building-service
      - bm-kafka

    networks:
      - joritna-network

  bm-share-and-help-service:
    build:
      context: ../../
      dockerfile: bm-share-and-help-service/Dockerfile.prod

    container_name: joritna-share-and-help-service
    restart: unless-stopped

    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}

      SHARE_AND_HELP_DB_URL: ${SHARE_AND_HELP_DB_URL}
      SHARE_AND_HELP_DB_USERNAME: ${SHARE_AND_HELP_DB_USERNAME}
      SHARE_AND_HELP_DB_PASSWORD: ${SHARE_AND_HELP_DB_PASSWORD}

      BUILDING_SERVICE_URL: ${BUILDING_SERVICE_URL}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}

    expose:
      - "8085"

    depends_on:
      - postgres
      - bm-building-service
      - bm-kafka

    networks:
      - joritna-network

  bm-chat-service:
    build:
      context: ../../
      dockerfile: bm-chat-service/Dockerfile.prod

    container_name: joritna-chat-service
    restart: unless-stopped

    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}

      CHAT_SERVICE_PORT: ${CHAT_SERVICE_PORT}
      CHAT_DB_URL: ${CHAT_DB_URL}
      CHAT_DB_USERNAME: ${CHAT_DB_USERNAME}
      CHAT_DB_PASSWORD: ${CHAT_DB_PASSWORD}

      BUILDING_SERVICE_URL: ${BUILDING_SERVICE_URL}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}

    expose:
      - "8087"

    depends_on:
      - postgres
      - bm-building-service
      - bm-kafka

    networks:
      - joritna-network

  bm-file-service:
    build:
      context: ../../
      dockerfile: bm-file-service/Dockerfile.prod

    container_name: joritna-file-service
    restart: unless-stopped

    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}

      FILE_DB_URL: ${FILE_DB_URL}
      FILE_DB_USERNAME: ${FILE_DB_USERNAME}
      FILE_DB_PASSWORD: ${FILE_DB_PASSWORD}

      FILE_SERVICE_PORT: ${FILE_SERVICE_PORT}
      FILE_STORAGE_UPLOAD_DIR: ${FILE_STORAGE_UPLOAD_DIR}

    expose:
      - "8086"

    volumes:
      - joritna_file_uploads:/app/uploads

    depends_on:
      - postgres

    networks:
      - joritna-network

  bm-notification-service:
    build:
      context: ../../
      dockerfile: bm-notification-service/Dockerfile.prod

    container_name: joritna-notification-service
    restart: unless-stopped

    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}

      NOTIFICATION_SERVICE_PORT: ${NOTIFICATION_SERVICE_PORT}

      NOTIFICATION_DB_URL: ${NOTIFICATION_DB_URL}
      NOTIFICATION_DB_USERNAME: ${NOTIFICATION_DB_USERNAME}
      NOTIFICATION_DB_PASSWORD: ${NOTIFICATION_DB_PASSWORD}

      BUILDING_SERVICE_URL: ${BUILDING_SERVICE_URL}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}

    expose:
      - "8088"

    depends_on:
      - postgres
      - bm-building-service
      - bm-kafka

    networks:
      - joritna-network

networks:
  joritna-network:
    name: joritna-network

volumes:
  joritna_postgres_data:
  joritna_kafka_data:
  joritna_file_uploads: