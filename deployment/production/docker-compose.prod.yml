services:

  nginx:
    image: nginx:1.27-alpine
    container_name: jeraano-nginx

    restart: unless-stopped

    ports:
      - "80:80"

    volumes:
      - ./nginx/api.conf:/etc/nginx/conf.d/default.conf:ro

    networks:
      - jeraano-network

  postgres:
    image: postgres:16-alpine

    container_name: jeraano-postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    volumes:
      - jeraano_postgres_data:/var/lib/postgresql/data

    networks:
      - jeraano-network

  kafka:
    image: apache/kafka:3.9.0

    container_name: jeraano-kafka

    restart: unless-stopped

    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs

    networks:
      - jeraano-network

networks:
  jeraano-network:
    name: jeraano-network

volumes:
  jeraano_postgres_data: