server:
  port: ${AUDIT_SERVICE_PORT:8089}

spring:
  application:
    name: bm-audit-service

  datasource:
    url: ${AUDIT_DB_URL}
    username: ${AUDIT_DB_USERNAME}
    password: ${AUDIT_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
    consumer:
      group-id: bm-audit-service
      auto-offset-reset: earliest

management:
  endpoints:
    web:
      exposure:
        include: health,info

  endpoint:
    health:
      show-details: never

info:
  app:
    name: bm-audit-service
    version: 1.0.0
    description: Audit service for Building Management