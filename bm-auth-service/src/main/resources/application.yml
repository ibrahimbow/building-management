server:
  port: ${AUTH_SERVICE_PORT:8081}

spring:
  application:
    name: bm-auth-service

  datasource:
    url: ${AUTH_DB_URL}
    username: ${AUTH_DB_USERNAME}
    password: ${AUTH_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

security:
  jwt:
    secret: ${AUTH_JWT_SECRET}
    expiration-minutes: ${AUTH_JWT_EXPIRATION_MINUTES:60}