server:
  port: ${AUTH_SERVICE_PORT:8081}

spring:
  application:
    name: bm-auth-service

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:bm-kafka:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  datasource:
    url: ${AUTH_DB_URL}
    username: ${AUTH_DB_USERNAME}
    password: ${AUTH_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

security:
  jwt:
    secret: ${AUTH_JWT_SECRET}
    expiration-minutes: ${AUTH_JWT_EXPIRATION_MINUTES:60}

management:
  endpoints:
    web:
      exposure:
        include: health,info

  endpoint:
    health:
      show-details: never

info:
  app:
    name: bm-auth-service
    version: 1.0.0
    description: Authentication service for Building Management