server:
  port: ${NOTIFICATION_SERVICE_PORT:8088}

spring:
  application:
    name: bm-notification-service

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:bm-kafka:9092}

    consumer:
      group-id: bm-notification-service
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false