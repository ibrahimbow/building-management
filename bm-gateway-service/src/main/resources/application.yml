name: Building Management CI/CD

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

permissions:
  contents: read
  packages: write

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build and test
        run: mvn clean verify

  docker-build-push:
    needs: build-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push auth service
        uses: docker/build-push-action@v6
        with:
          context: .
          file: bm-auth-service/Dockerfile
          push: true
          tags: |
            ghcr.io/ibrahimbow/bm-auth-service:latest
            ghcr.io/ibrahimbow/bm-auth-service:${{ github.sha }}

      - name: Build and push gateway service
        uses: docker/build-push-action@v6
        with:
          context: bm-gateway-service
          file: bm-gateway-service/Dockerfile
          push: true
          tags: |
            ghcr.io/ibrahimbow/bm-gateway-service:latest
            ghcr.io/ibrahimbow/bm-gateway-service:${{ github.sha }}