name: Building Management CI/CD

on:
  push:
    branches:
      - master

  pull_request:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: building-management-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build and run tests
        run: mvn --batch-mode clean verify