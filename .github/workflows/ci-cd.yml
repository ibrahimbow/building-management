name: Building Management CI/CD

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build-services:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build auth service
        run: mvn clean package -DskipTests
        working-directory: bm-auth-service

      - name: Build gateway service
        run: mvn clean package -DskipTests
        working-directory: bm-gateway-service

      - name: Build building service
        run: mvn clean package -DskipTests
        working-directory: bm-building-service