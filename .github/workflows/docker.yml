name: Docker Build and Push

on:
  push:
    branches: [ "master" ]

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build Maven modules
        run: mvn clean package -DskipTests

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Auth Service Image
        run: |
          docker build -t ghcr.io/ibrahimbow/bm-auth-service:latest ./bm-auth-service
          docker push ghcr.io/ibrahimbow/bm-auth-service:latest

      - name: Build and Push Gateway Service Image
        run: |
          docker build -t ghcr.io/ibrahimbow/bm-gateway-service:latest ./bm-gateway-service
          docker push ghcr.io/ibrahimbow/bm-gateway-service:latest