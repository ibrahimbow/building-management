services:
  postgres:
    image: postgres:16
    container_name: bm-postgres
    environment:
      POSTGRES_DB: building_management
      POSTGRES_USER: bm_user
      POSTGRES_PASSWORD: bm_password
    ports:
      - "5432:5432"

  bm-auth-service:
    image: ghcr.io/ibrahimbow/bm-auth-service:latest
    container_name: bm-auth-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/building_management
      SPRING_DATASOURCE_USERNAME: bm_user
      SPRING_DATASOURCE_PASSWORD: bm_password
      JWT_SECRET: your-secret-here
    depends_on:
      - postgres

  bm-gateway-service:
    image: ghcr.io/ibrahimbow/bm-gateway-service:latest
    container_name: bm-gateway-service
    ports:
      - "8080:8080"
    depends_on:
      - bm-auth-service