services:
  bm-postgres:
    image: postgres:16
    container_name: bm-postgres
    environment:
      POSTGRES_DB: building_management_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - bm_postgres_data:/var/lib/postgresql/data
    networks:
      - bm-network

  bm-auth-service:
    build:
      context: .
      dockerfile: bm-auth-service/Dockerfile
    container_name: bm-auth-service
    depends_on:
      - bm-postgres
    environment:
      AUTH_SERVICE_PORT: 8081
      AUTH_DB_URL: jdbc:postgresql://bm-postgres:5432/building_management_db
      AUTH_DB_USERNAME: postgres
      AUTH_DB_PASSWORD: ${POSTGRES_PASSWORD}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET}
      AUTH_JWT_EXPIRATION_MINUTES: 60
    ports:
      - "8081:8081"
    networks:
      - bm-network

volumes:
  bm_postgres_data:

networks:
  bm-network:
    driver: bridge