services:
  postgres:
    image: postgres:16
    container_name: bm-postgres
    environment:
      POSTGRES_DB: building_management
      POSTGRES_USER: bm_user
      POSTGRES_PASSWORD: bm_password
    ports:
      - "5432:5432"

  bm-auth-service:
    image: ghcr.io/ibrahimbow/bm-auth-service:latest
    container_name: bm-auth-service
    ports:
      - "8081:8081"
    environment:
      AUTH_DB_URL: jdbc:postgresql://postgres:5432/building_management
      AUTH_DB_USERNAME: bm_user
      AUTH_DB_PASSWORD: bm_password
      AUTH_JWT_SECRET: change-this-secret
    depends_on:
      - postgres

  bm-gateway-service:
    image: ghcr.io/ibrahimbow/bm-gateway-service:latest
    container_name: bm-gateway-service
    ports:
      - "8080:8080"
    environment:
      AUTH_SERVICE_URL: http://bm-auth-service:8081
    depends_on:
      - bm-auth-service